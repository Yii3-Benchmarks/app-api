services:
  php:
    build:
      dockerfile: docker/Dockerfile
      context: ..
      target: dev
      args:
        USER_ID: ${UID}
        GROUP_ID: ${GID}
    env_file:
      - path: ./test/.env
      - path: ./test/override.env
        required: false
    volumes:
      - ../:/app
      - ../runtime:/app/runtime
    tty: true

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../:/app
      - ../docker/dev/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
