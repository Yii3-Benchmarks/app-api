services:
  php:
    build:
      dockerfile: docker/Dockerfile
      context: ..
      target: dev
      args:
        USER_ID: ${UID}
        GROUP_ID: ${GID}
    env_file:
      - path: ./test/.env
      - path: ./test/override.env
        required: false
    volumes:
      - ../:/app
      - ../runtime:/app/runtime
    depends_on:
      valkey:
        condition: service_healthy
      postgres:
        condition: service_healthy
    tty: true

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../:/app
      - ../docker/dev/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: benchmark
      POSTGRES_USER: benchmark
      POSTGRES_PASSWORD: benchmark
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchmark -d benchmark"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ../docker/postgres/initdb.d:/docker-entrypoint-initdb.d:ro

