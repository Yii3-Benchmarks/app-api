services:
  php:
    build:
      dockerfile: docker/Dockerfile
      context: ..
      target: dev
      args:
        USER_ID: ${UID}
        GROUP_ID: ${GID}
    env_file:
      - path: ./dev/.env
      - path: ./dev/override.env
        required: false
    restart: unless-stopped
    volumes:
      - ../:/app
      - ../runtime:/app/runtime
    tty: true

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${DEV_PORT:-80}:80"
    volumes:
      - ../:/app
      - ./dev/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
