services:
  app:
    build:
      dockerfile: docker/Dockerfile
      context: ..
      target: dev
      args:
        USER_ID: ${UID}
        GROUP_ID: ${GID}
    env_file:
      - path: ./dev/.env
      - path: ./dev/override.env
        required: false
    restart: unless-stopped
    ports:
      - "${DEV_PORT:-80}:8080"
    volumes:
      - ../:/app
      - ../runtime:/app/runtime
    working_dir: /app
    command: ["rr", "serve", "-c", ".rr.yaml", "-w", "/app"]
    tty: true
