version: "3"

server:
  command: "php worker.php"
  relay: pipes

rpc:
  listen: tcp://127.0.0.1:${RR_RPC_PORT:-6001}

status:
  address: 127.0.0.1:${RR_STATUS_PORT:-2114}

http:
  address: 0.0.0.0:${APP_PORT:-8080}
  middleware: [static, gzip, headers]
  pool:
    debug: ${RR_POOL_DEBUG:-false}
    num_workers: ${RR_NUM_WORKERS:-0}
    max_jobs: ${RR_MAX_JOBS:-0}
    max_queue_size: ${RR_MAX_QUEUE_SIZE:-0}
    allocate_timeout: ${RR_ALLOCATE_TIMEOUT:-60s}
    reset_timeout: ${RR_RESET_TIMEOUT:-60s}
    stream_timeout: ${RR_STREAM_TIMEOUT:-60s}
    destroy_timeout: ${RR_DESTROY_TIMEOUT:-60s}
    supervisor:
      watch_tick: ${RR_SUPERVISOR_WATCH_TICK:-5s}
      ttl: ${RR_SUPERVISOR_TTL:-0s}
      idle_ttl: ${RR_SUPERVISOR_IDLE_TTL:-10s}
      max_worker_memory: 192
      exec_ttl: ${RR_SUPERVISOR_EXEC_TTL:-60s}
  static:
    dir: "./public"
    forbid: [".php", ".htaccess"]
  headers:
    response:
      Cache-Control: "no-cache"

logs:
  mode: ${RR_LOG_MODE:-production}
  level: ${RR_LOG_LEVEL:-warn}
